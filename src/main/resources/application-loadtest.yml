# 부하 테스트 전용 프로파일 — config-server 없이 독립 실행
# 실행: java -jar order-service.jar --spring.profiles.active=loadtest,stub
# 환경변수:
#   DB_URL      : jdbc:mysql://{RDS-엔드포인트}:3306/orderdb
#   DB_USER     : myuser
#   DB_PASSWORD : order111
#   LOKI_URL    : http://{모니터링EC2-IP}:3100
#   TEMPO_ENDPOINT: http://{모니터링EC2-IP}:4318/v1/traces

spring:
  config:
    import: "optional:configserver:"   # config-server 없어도 기동

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/orderdb}
    username: ${DB_USER:myuser}
    password: ${DB_PASSWORD:order111}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  kafka:
    bootstrap-servers: localhost:9092  # stub 모드에서 Kafka 미사용 — 연결 실패 무시
    consumer:
      auto-startup: false              # Kafka 컨슈머 비활성 (stub 모드)

logging:
  level:
    allmart: INFO
    org.hibernate.SQL: OFF
    org.springframework.web: WARN
