name: CD

on:
  push:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 646596232446.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: order-service

jobs:
  deploy:
    name: Build & Deploy to k3s
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Java 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: gradlew 실행 권한 부여
        run: chmod +x gradlew

      - name: JAR 빌드 (테스트 제외)
        run: ./gradlew bootJar -x test

      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR 로그인
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 이미지 빌드 & ECR 푸시
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }} .
          docker tag ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }} \
                     ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: k3s 배포 (kubectl set image)
        uses: appleboy/ssh-action@v1
        with:
          host: 3.36.78.100
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # ECR 로그인 후 이미지 pull (k3s가 ECR에서 pull할 수 있게)
            aws ecr get-login-password --region ap-northeast-2 \
              | sudo k3s ctr images pull --plain-http=false \
              --user AWS:$(aws ecr get-login-password --region ap-northeast-2) \
              646596232446.dkr.ecr.ap-northeast-2.amazonaws.com/order-service:latest || true

            # 배포
            sudo kubectl apply -f /home/ubuntu/k8s/order-service.yaml
            sudo kubectl set image deployment/order-service \
              order-service=646596232446.dkr.ecr.ap-northeast-2.amazonaws.com/order-service:${{ github.sha }} \
              -n allmart
            sudo kubectl rollout status deployment/order-service -n allmart --timeout=120s
