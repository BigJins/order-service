name: CD

on:
  push:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 646596232446.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: order-service

jobs:
  deploy:
    name: Build & Deploy to k3s
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Java 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: gradlew 실행 권한 부여
        run: chmod +x gradlew

      - name: JAR 빌드 (테스트 제외)
        run: ./gradlew bootJar -x test

      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR 로그인
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 이미지 빌드 & ECR 푸시
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }} .
          docker tag ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }} \
                     ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: ECR 토큰 발급
        id: ecr_token
        run: echo "token=$(aws ecr get-login-password --region ap-northeast-2)" >> $GITHUB_OUTPUT

      - name: k3s 배포 (kubectl set image)
        uses: appleboy/ssh-action@v1
        env:
          ECR_TOKEN: ${{ steps.ecr_token.outputs.token }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: 3.36.78.100
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_TOKEN,IMAGE_TAG
          script: |
            # ecr-secret 갱신 (GitHub Actions 러너에서 발급한 토큰 사용 — k3s master에 AWS CLI 불필요)
            sudo kubectl create secret docker-registry ecr-secret \
              --docker-server=646596232446.dkr.ecr.ap-northeast-2.amazonaws.com \
              --docker-username=AWS \
              --docker-password="$ECR_TOKEN" \
              -n allmart --dry-run=client -o yaml | sudo kubectl apply -f -

            # 배포
            sudo kubectl apply -f /home/ubuntu/k8s/order-service.yaml
            sudo kubectl set image deployment/order-service \
              order-service=646596232446.dkr.ecr.ap-northeast-2.amazonaws.com/order-service:$IMAGE_TAG \
              -n allmart
            sudo kubectl rollout status deployment/order-service -n allmart --timeout=300s
